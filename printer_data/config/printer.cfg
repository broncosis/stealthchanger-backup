[include .dynamicmacros.cfg]
[include fluidd.cfg]

[exclude_object]
[respond]

[pause_resume]
recover_velocity: 50

[save_variables]
filename:  ~/variables.cfg

[gcode_arcs]
resolution: 0.1
[include mcu.cfg]

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT


[printer]
kinematics: corexy
max_velocity: 900
max_accel: 10000
max_z_velocity: 200
max_z_accel: 500

[force_move]
enable_force_move: True

[quad_gantry_level]
##	Gantry Corners for 350mm Build
gantry_corners:
	-70,-10
	420,410
#	Probe points
points:
	50,50
	50,300
	300,300
	300,50
#   Probe points
speed: 800
horizontal_move_z: 5
max_adjust: 25
retries: 8
retry_tolerance: 0.0075




[bed_mesh]
speed: 250
horizontal_move_z: 10
mesh_min: 30, 30
mesh_max: 320, 320
probe_count: 5,5
adaptive_margin: 5

[rounded_path]
resolution: 0.2
replace_g0: False

[force_move]
enable_force_move: True

#[resonance_tester]

[include toolchanger-tool_detection.cfg]
[include toolchanger.cfg]
[include toolchanger-macros.cfg]
[include toolchanger-homing.cfg]

[include toolchanger-usermacros.cfg]
[include toolchanger-extra-macro.cfg]
[include calibrate-offsets.cfg]
[include calibrate-offsets-macros.cfg]
[include mbbcan.cfg]
[include macros.cfg]
#[include menu.cfg]
[include tool0.cfg]
[include tool1.cfg]
[include tool2.cfg]
[include tool3.cfg]
[include tool4.cfg]
[include case.cfg]
#[include prime_lines.cfg]
[include prime_purge.cfg]
[include feeder.cfg]
[dynamicmacros]
configs: dynamic.cfg
[include probemac.cfg]

