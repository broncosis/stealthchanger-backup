# =============================================================================
# feeder.cfg — Bowden feeder MCU, steppers, belay tensioners, and load macros
# =============================================================================
# Hardware overview:
#   - Separate "feeder" MCU drives 5 independent Bowden feeder steppers
#   - Each tool has a belay tensioner to compensate for filament slack/tension
#   - Physical unload buttons mounted at each feeder position
#   - filament_sensor_at_tool{N} (toolhead) defined in tool{N}.cfg
# =============================================================================


# -----------------------------------------------------------------------------
# MCU
# -----------------------------------------------------------------------------

[mcu feeder]
serial: /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0


# -----------------------------------------------------------------------------
# Belay tensioners — compensate for filament slack between feeder and toolhead
# multiplier_high/low set the speed ratio bounds before belay intervenes
# -----------------------------------------------------------------------------

[belay tool0_belay]
extruder_type: extruder_stepper
extruder_stepper_name: _tool0_feeder
sensor_pin: !feeder:PD3
multiplier_high: 1.05
multiplier_low: 0.95
debug_level: 1

[belay tool1_belay]
extruder_type: extruder_stepper
extruder_stepper_name: _tool1_feeder
sensor_pin: !feeder:PJ0
multiplier_high: 1.05
multiplier_low: 0.95
debug_level: 1

[belay tool2_belay]
extruder_type: extruder_stepper
extruder_stepper_name: _tool2_feeder
sensor_pin: !feeder:PJ1
multiplier_high: 1.05
multiplier_low: 0.95
debug_level: 1

[belay tool3_belay]
extruder_type: extruder_stepper
extruder_stepper_name: _tool3_feeder
sensor_pin: !feeder:PE4
multiplier_high: 1.05
multiplier_low: 0.95
debug_level: 1

[belay tool4_belay]
extruder_type: extruder_stepper
extruder_stepper_name: _tool4_feeder
sensor_pin: !feeder:PE5
multiplier_high: 1.05
multiplier_low: 0.95
debug_level: 1


# -----------------------------------------------------------------------------
# Physical unload buttons — one per tool, mounted at the feeder box
# D=1400 should match your bowden tube length in mm
# -----------------------------------------------------------------------------

[gcode_button t0_unload_button]
pin: ^!feeder:PD2
press_gcode:
    UNLOAD_ANY_TOOL T=0 D=1400 S=30

[gcode_button t1_unload_button]
pin: !feeder:PK4
press_gcode:
    UNLOAD_ANY_TOOL T=1 D=1400 S=30

[gcode_button t2_unload_button]
pin: !feeder:PK7
press_gcode:
    UNLOAD_ANY_TOOL T=2 D=1400 S=30

[gcode_button t3_unload_button]
pin: !feeder:PK6
press_gcode:
    UNLOAD_ANY_TOOL T=3 D=1400 S=30

[gcode_button t4_unload_button]
pin: !feeder:PK5
press_gcode:
    UNLOAD_ANY_TOOL T=4 D=1400 S=30


# -----------------------------------------------------------------------------
# Feeder steppers — one BMG-style extruder stepper per tool
# rotation_distance tuned for 50:17 gear ratio on BMG
# -----------------------------------------------------------------------------

[extruder_stepper _tool0_feeder]
extruder: extruder
step_pin: feeder:PF0
dir_pin:  feeder:PF1
enable_pin: !feeder:PD7
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 50:17
rotation_distance: 22.319100012672

[tmc2208 extruder_stepper _tool0_feeder]
uart_pin: feeder:PG5
run_current: .5
hold_current: .05
stealthchop_threshold: 250

[extruder_stepper _tool1_feeder]
extruder: extruder1
step_pin: feeder:PF6
dir_pin: feeder:PF7
enable_pin: !feeder:PF2
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 50:17
rotation_distance: 22.319100012672

[tmc2208 extruder_stepper _tool1_feeder]
uart_pin: feeder:PE3
run_current: .5
hold_current: .05
stealthchop_threshold: 250

[extruder_stepper _tool2_feeder]
extruder: extruder2
step_pin: feeder:PL3
dir_pin:  feeder:PL1
enable_pin: !feeder:PK0
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 50:17
rotation_distance: 22.319100012672

[tmc2208 extruder_stepper _tool2_feeder]
uart_pin: feeder:PH3
run_current: .5
hold_current: .05
stealthchop_threshold: 250

[extruder_stepper _tool3_feeder]
extruder: extruder3
step_pin: feeder:PA4
dir_pin: !feeder:PA6
enable_pin: !feeder:PA2
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 50:17
rotation_distance: 22.319100012672

[tmc2208 extruder_stepper _tool3_feeder]
uart_pin: feeder:PB5
run_current: .5
hold_current: .05
stealthchop_threshold: 250

[extruder_stepper _tool4_feeder]
extruder: extruder4
step_pin: feeder:PC1
dir_pin: !feeder:PC3
enable_pin: !feeder:PC7
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 50:17
rotation_distance: 22.319100012672

[tmc2208 extruder_stepper _tool4_feeder]
uart_pin: feeder:PB6
run_current: .5
hold_current: .05
stealthchop_threshold: 250


# -----------------------------------------------------------------------------
# Safety guard — called at the start of every load/unload macro
# Raises an error (halts execution) if any condition is not met
# -----------------------------------------------------------------------------

[gcode_macro _CHECK_READY]
description: Abort if machine is not homed, QGL not applied, or actively printing
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        { action_raise_error("Machine not homed.") }
    {% elif printer.quad_gantry_level.applied|lower == 'false' %}
        { action_raise_error("QGL not applied.") }
    {% elif printer.print_stats.state == "printing" and not printer.pause_resume.is_paused %}
        { action_raise_error("Print is active. Pause or cancel before loading/unloading.") }
    {% endif %}


# -----------------------------------------------------------------------------
# LOAD_ANY_TOOL — sensor-based load
# Positions toolhead at purge bucket then calls _FILAMENT_FEED. Heating and
# purging happen in _LOAD_COMPLETE once the toolhead sensor triggers.
#
# Parameters:
#   T = tool index
#   S = feeder speed in mm/s (default 30)
#   D = max feed distance / bowden length in mm (default 1400)
# -----------------------------------------------------------------------------

[gcode_macro LOAD_ANY_TOOL]
description: [T<index>] [S<speed>] [D<distance>] Load filament using sensor feedback
variable_purge:     150  # mm to purge after filament reaches toolhead
variable_bucket_x:   25  # X position of purge bucket
variable_bucket_y:   -4  # Y position of purge bucket
variable_load_temp: 220  # temperature to purge at
variable_dist:       10  # step size passed to _FILAMENT_FEED loop (mm)
variable_paused:      0  # tracks pause state for _LOAD_COMPLETE
gcode:
    _CHECK_READY
    {% set T = params.T|int %}
    {% set speed = params.S|default(30)|float %}
    {% set max_dist = params.D|default(1400)|float %}
    {% set paused = printer.pause_resume.is_paused %}

    {% if printer.toolchanger.tool_number|int != T %}
        RESPOND MSG="Switching to tool {T}"
        T{T}
    {% endif %}

    SET_GCODE_VARIABLE MACRO=LOAD_ANY_TOOL VARIABLE=paused VALUE={1 if paused else 0}

    G90
    {% if not paused %}
        {% if printer.toolhead.position.z < 20 %}
            G1 Z20 F900
        {% endif %}
        G1 X{bucket_x} Y{bucket_y} F1800
    {% else %}
        M118 Print is paused: skipping move to purge bucket
    {% endif %}

    M104 S{load_temp}
    _FILAMENT_FEED T={T} S={speed} MAX={max_dist} D={dist}


# -----------------------------------------------------------------------------
# _LOAD_COMPLETE — called by _FILAMENT_FEED_LOOP when sensor triggers
# Heats, purges, and cleans up. Reads context from LOAD_ANY_TOOL variables.
# -----------------------------------------------------------------------------

[gcode_macro _LOAD_COMPLETE]
gcode:
    {% set T = printer["gcode_macro _FILAMENT_FEED"].tool|int %}
    {% set load_temp = printer["gcode_macro LOAD_ANY_TOOL"].load_temp %}
    {% set purge = printer["gcode_macro LOAD_ANY_TOOL"].purge %}
    {% set paused = printer["gcode_macro LOAD_ANY_TOOL"].paused|int %}

    M109 S{load_temp}
    M83
    G1 E{purge} F300
    G1 E-5 F1800
    M82
    M400

    {% if not paused %}
        CLEAN_NOZZLE
        M104 S0
    {% endif %}

    M118 Tool {T} loaded


# -----------------------------------------------------------------------------
# _FILAMENT_FEED — entry point for sensor-based feeding
#
# Does a fast blind pre-feed (preload mm) to cover most of the bowden quickly,
# then hands off to _FILAMENT_FEED_LOOP which steps and checks the toolhead
# sensor each iteration.
#
# Parameters:
#   T       = tool index (default 0)
#   S       = feed speed in mm/s (default 30)
#   D       = step size for the sensor loop in mm (default 10)
#   MAX     = maximum total distance before aborting (default 1900)
#   PRELOAD = blind fast-feed distance before sensor loop starts (default 800)
# -----------------------------------------------------------------------------

[gcode_macro _FILAMENT_FEED]
variable_tool:      0
variable_speed:    30
variable_dist:     10
variable_max_dist: 1900
variable_preload:   800
variable_moved:     0
gcode:
    {% set T = params.T|default(0)|int %}
    {% set speed = params.S|default(speed)|float %}
    {% set dist = params.D|default(dist)|float %}
    {% set max_dist = params.MAX|default(max_dist)|float %}
    {% set preload = params.PRELOAD|default(preload)|float %}
    {% set sensor = "filament_switch_sensor filament_sensor_at_tool%s" % T %}

    SET_GCODE_VARIABLE MACRO=_FILAMENT_FEED VARIABLE=tool VALUE={T}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_FEED VARIABLE=speed VALUE={speed}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_FEED VARIABLE=dist VALUE={dist}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_FEED VARIABLE=max_dist VALUE={max_dist}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_FEED VARIABLE=moved VALUE=0

    {% if printer[sensor].filament_detected %}
        RESPOND MSG="Tool {T}: Filament already at sensor — proceeding to heat and purge"
        _LOAD_COMPLETE
    {% else %}
        RESPOND MSG="Tool {T}: Starting filament feed"
        FORCE_MOVE STEPPER="extruder_stepper _tool{T}_feeder" DISTANCE={preload} VELOCITY={speed}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_FEED VARIABLE=moved VALUE={preload}
        UPDATE_DELAYED_GCODE ID=_FILAMENT_FEED_LOOP DURATION=0.1
    {% endif %}


# -----------------------------------------------------------------------------
# _FILAMENT_FEED_LOOP — sensor-checking step loop (called via delayed_gcode)
#
# Reads state from _FILAMENT_FEED variables each iteration so sensor data is
# always fresh. Reschedules itself until sensor triggers or max distance hit.
# -----------------------------------------------------------------------------

[delayed_gcode _FILAMENT_FEED_LOOP]
gcode:
    {% set T = printer["gcode_macro _FILAMENT_FEED"].tool|int %}
    {% set speed = printer["gcode_macro _FILAMENT_FEED"].speed|float %}
    {% set dist = printer["gcode_macro _FILAMENT_FEED"].dist|float %}
    {% set max_dist = printer["gcode_macro _FILAMENT_FEED"].max_dist|float %}
    {% set moved = printer["gcode_macro _FILAMENT_FEED"].moved|float %}
    {% set sensor = "filament_switch_sensor filament_sensor_at_tool%s" % T %}

    {% if printer[sensor].filament_detected %}
        RESPOND MSG="Tool {T}: Sensor triggered at {moved}mm"
        _LOAD_COMPLETE
    {% elif moved >= max_dist %}
        RESPOND MSG="Tool {T}: Max distance {max_dist}mm reached, aborting"
    {% else %}
        FORCE_MOVE STEPPER="extruder_stepper _tool{T}_feeder" DISTANCE={dist} VELOCITY={speed}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_FEED VARIABLE=moved VALUE={moved + dist}
        UPDATE_DELAYED_GCODE ID=_FILAMENT_FEED_LOOP DURATION=0.1
    {% endif %}


# -----------------------------------------------------------------------------
# LOAD_ANY_TOOL_DIST — fixed-distance load (no sensor required)
# Use this for setups without a toolhead filament sensor.
# Measure your PTFE tube length carefully — filament will feed exactly D mm.
#
# Parameters:
#   T = tool index
#   S = feeder speed in mm/s (default 30)
#   D = distance to feed in mm (default 1400)
# -----------------------------------------------------------------------------

[gcode_macro LOAD_ANY_TOOL_DIST]
description: [T<index>] [S<speed>] [D<distance>] Load filament by fixed distance (no sensor)
variable_purge:     150  # mm to purge through nozzle after feeding
variable_bucket_x:   25  # X position of purge bucket
variable_bucket_y:   -4  # Y position of purge bucket
variable_load_temp: 220  # temperature to load and purge at
gcode:
    _CHECK_READY
    {% set T = params.T|int %}
    {% set speed = params.S|default(30)|float %}
    {% set dist = params.D|default(1400)|float %}
    {% set paused = printer.pause_resume.is_paused %}

    {% if printer.toolchanger.tool_number|int != T %}
        RESPOND MSG="Switching to tool {T}"
        T{T}
    {% endif %}

    M104 S{load_temp}
    G90

    {% if not paused %}
        {% if printer.toolhead.position.z < 20 %}
            G1 Z20 F900
        {% endif %}
        G1 X{bucket_x} Y{bucket_y} F1800
    {% else %}
        M118 Print is paused: skipping move to purge bucket
    {% endif %}

    FORCE_MOVE STEPPER="extruder_stepper _tool{T}_feeder" DISTANCE={dist} VELOCITY={speed}

    M109 S{load_temp}
    M83
    G1 E{purge} F300
    G1 E-5 F1800
    M82
    M400

    {% if not paused %}
        CLEAN_NOZZLE
        M104 S0
    {% endif %}

    M118 Tool {T} loaded


# -----------------------------------------------------------------------------
# UNLOAD_ANY_TOOL — purges tip then retracts filament back past the feeder
#
# Parameters:
#   T = tool index
#   S = feeder retract speed in mm/s (default 30)
#   D = retract distance / bowden length in mm (default 1400)
# -----------------------------------------------------------------------------

[gcode_macro UNLOAD_ANY_TOOL]
description: [T<index>] [S<speed>] [D<distance>] Unload filament
variable_purge:          100  # mm to retract after tip shaping to clear the nozzle
variable_bucket_x:        25  # X position of purge bucket
variable_bucket_y:        -4  # Y position of purge bucket
variable_load_temp:      220  # temperature to unload at
variable_tip_slow_dist:    5  # mm to retract slowly to form the tip
variable_tip_slow_speed: 300  # F value for slow phase (~5mm/s)
variable_tip_fast_dist:   40  # mm to retract fast to escape the heatbreak zone
variable_tip_fast_speed: 3600 # F value for fast phase (~60mm/s)
gcode:
    _CHECK_READY
    {% set T = params.T|int %}
    {% set speed = params.S|default(30)|float %}
    {% set dist = params.D|default(1400)|float %}

    {% if printer.toolchanger.tool_number|int != T %}
        RESPOND MSG="Switching to tool {T}"
        T{T}
    {% endif %}

    M104 S{load_temp}
    G90
    {% if printer.toolhead.position.z < 20 %}
        G1 Z20 F900
    {% endif %}
    G1 X{bucket_x} Y{bucket_y} F1800

    M109 S{load_temp}                           ; wait for temp before moving filament
    M83
    G1 E1 F200                                  ; equalize pressure before retract
    G1 E-{tip_slow_dist} F{tip_slow_speed}      ; slow retract to form tip
    G1 E-{tip_fast_dist} F{tip_fast_speed}      ; fast retract to escape heatbreak before second blob forms
    G1 E-{purge} F600                           ; clear remaining filament from nozzle
    M82
    M400

    FORCE_MOVE STEPPER="extruder_stepper _tool{T}_feeder" DISTANCE=-{dist} VELOCITY={speed}  ; pull back through bowden

    M104 S0
    M118 Tool {T} unloaded

#test